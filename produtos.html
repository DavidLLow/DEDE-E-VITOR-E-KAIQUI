<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Produtos</title>

  <link rel="stylesheet" href="css/produtos.css">
</head>

<body>

  <header>

    <div class="logo">
      CENTRAL CEE
    </div>

    <nav>
      <a href="index.html">Início</a>
      <a href="carrinho.html">Carrinho</a>
      <a href="login.html">Login</a>
    </nav>

    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Pesquisar roupa...">
    </div>

  </header>
  <section class="products-section">

    <button id="showAllBtn">
      Mostrar Todos
    </button>

    <div class="title">
      <h1>IMPORTADOS</h1>
    </div>

    <!-- CONTAINER DOS PRODUTOS -->
    <div class="products" id="productsContainer">

      <!-- PRODUTO 1 -->
      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200">

        <div class="product-info">

          <h3>Camiseta Trapstar</h3>

          <span class="price">
            R$ 149,90
          </span>

          <div class="buttons-product">

            <button class="buy-btn">
              Comprar
            </button>

            <button class="cart-btn">
              🛒 Carrinho
            </button>

          </div>

        </div>

      </div>





      <!-- PRODUTO 2 -->
      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200">

        <div class="product-info">

          <h3>Jaqueta Central Cee</h3>

          <span class="price">
            R$ 299,90
          </span>

          <div class="buttons-product">

            <button class="buy-btn">
              Comprar
            </button>

            <button class="cart-btn">
              🛒 Carrinho
            </button>

          </div>

        </div>

      </div>





      <!-- PRODUTO 3 -->
      <div class="product-card">

        <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200">

        <div class="product-info">

          <h3>Calça Cargo Premium</h3>

          <span class="price">
            R$ 219,90
          </span>

          <div class="buttons-product">

            <button class="buy-btn">
              Comprar
            </button>

            <button class="cart-btn">
              🛒 Carrinho
            </button>

          </div>

        </div>


    </div>
    <!-- FIM DO CONTAINER -->

  
  </section>

  <footer>

    <h3>
      Central Cee Imports © 2026
    </h3>

  </footer>

  <script src="js/produtos.js"></script>

</body>

</html>
