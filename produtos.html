<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
  content="width=device-width, initial-scale=1.0">

  <title>Produtos</title>

  <link rel="stylesheet"
  href="css/produtos.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<header>

  <div class="logo">
    CENTRAL CEE
  </div>

  <nav>

    <a href="index.html">
      Início
    </a>

    <a href="login.html">
      Login
    </a>

    <a href="carrinho.html" class="cart-top">
      <i class="fa-solid fa-cart-shopping"></i>
    </a>

  </nav>

</header>





<section class="products-section">

  <div class="search-area">

    <input
    type="text"
    id="searchInput"
    placeholder="Pesquisar roupa...">

    <button id="searchBtn">

      <i class="fa-solid fa-magnifying-glass"></i>

    </button>

  </div>





  <button id="showAllBtn">
    Mostrar Todos
  </button>





  <div class="title">
    <h1>IMPORTADOS</h1>
  </div>





  <div class="products"
  id="productsContainer">





    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200">

      <div class="product-info">

        <h3>Camiseta Trapstar</h3>

        <span class="price">
          R$ 149,90
        </span>

        <div class="buttons-product">

          <button class="buy-btn">
            Comprar
          </button>

          <button class="cart-btn">
            🛒 Carrinho
          </button>

        </div>

      </div>

    </div>







    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200">

      <div class="product-info">

        <h3>Jaqueta Central Cee</h3>

        <span class="price">
          R$ 299,90
        </span>

        <div class="buttons-product">

          <button class="buy-btn">
            Comprar
          </button>

          <button class="cart-btn">
            🛒 Carrinho
          </button>

        </div>

      </div>

    </div>







    <div class="product-card">

      <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200">

      <div class="product-info">

        <h3>Calça Cargo Premium</h3>

        <span class="price">
          R$ 219,90
        </span>

        <div class="buttons-product">

          <button class="buy-btn">
            Comprar
          </button>

          <button class="cart-btn">
            🛒 Carrinho
          </button>

        </div>

      </div>

    </div>





  </div>

</section>

<script src="js/produtos.js"></script>

</body>
</html>
